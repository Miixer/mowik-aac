<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Komunikator AAC</title>
  <meta name="description" content="Prosty polski komunikator AAC z kafelkami, syntezą mowy, trybem telefonu i synchronizacją przez kod.">
  <meta name="theme-color" content="#256d7b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AAC">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #1e2328;
      --muted: #5e6972;
      --line: #d8ded8;
      --accent: #256d7b;
      --accent-2: #8f4c2f;
      --good: #24744f;
      --warn: #a45b00;
      --danger: #b3261e;
      --shadow: 0 12px 30px rgba(31, 43, 53, .10);
      --radius: 8px;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(37, 109, 123, .08), transparent 340px),
        var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      width: min(1280px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      border-radius: var(--radius);
      color: white;
      background: var(--accent);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2vw, 1.65rem);
      line-height: 1.1;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .94rem;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-button,
    .pill-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: var(--panel);
      box-shadow: 0 5px 14px rgba(31, 43, 53, .06);
    }

    .icon-button {
      width: 44px;
    }

    .pill-button {
      gap: 8px;
      padding: 0 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .icon-button:hover,
    .pill-button:hover,
    .tile:hover,
    .category-tab:hover {
      border-color: rgba(37, 109, 123, .45);
      transform: translateY(-1px);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .sentence {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 72px;
      overflow-x: auto;
      padding: 6px;
      border-radius: var(--radius);
      background: #eef4f0;
    }

    .placeholder {
      padding: 0 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      padding: 10px 12px;
      border: 1px solid rgba(37, 109, 123, .22);
      border-radius: var(--radius);
      background: white;
      font-weight: 750;
      box-shadow: 0 4px 10px rgba(31, 43, 53, .06);
    }

    .word-chip span:first-child {
      font-size: 1.45rem;
    }

    .speak-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 160px;
      padding: 0 18px;
      border-radius: var(--radius);
      color: white;
      background: var(--accent);
      font-size: 1.08rem;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(37, 109, 123, .24);
    }

    .main {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 14px;
      min-height: 0;
    }

    .sidebar,
    .board-wrap {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .86);
      box-shadow: var(--shadow);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 12px;
    }

    .search {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: white;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 109, 123, .16);
    }

    .categories {
      display: grid;
      align-content: start;
      gap: 8px;
      overflow: auto;
    }

    .category-tab {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 7px 9px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--ink);
      background: transparent;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .category-tab.active {
      border-color: rgba(37, 109, 123, .45);
      background: #e9f2ef;
      font-weight: 800;
    }

    .category-icon,
    .tile-icon {
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: rgba(37, 109, 123, .12);
    }

    .category-icon {
      width: 34px;
      height: 34px;
      font-size: 1.35rem;
    }

    .sidebar-tools {
      display: grid;
      gap: 8px;
    }

    .board-wrap {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .board-title {
      min-width: 0;
    }

    .board-title h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    .board-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .board-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 12px;
      align-content: start;
      overflow: auto;
      padding: 14px;
    }

    .tile {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      min-height: 138px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: var(--panel);
      box-shadow: 0 8px 18px rgba(31, 43, 53, .06);
      transition: transform .16s ease, border-color .16s ease;
    }

    .tile-icon {
      min-height: 74px;
      font-size: 2.45rem;
    }

    .tile-label {
      display: block;
      overflow-wrap: anywhere;
      color: var(--ink);
      font-weight: 850;
      line-height: 1.15;
      text-align: center;
    }

    .tile.small {
      min-height: 108px;
    }

    .tile.small .tile-icon {
      min-height: 52px;
      font-size: 2rem;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(17, 24, 31, .45);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal {
      width: min(540px, 100%);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(17, 24, 31, .28);
      overflow: hidden;
    }

    .modal header,
    .modal footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .modal footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .modal h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .form {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 700;
    }

    .form input,
    .form select,
    .sync-box textarea {
      width: 100%;
      min-height: 44px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: white;
    }

    .sync-box {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .sync-box textarea {
      min-height: 160px;
      padding: 11px;
      resize: vertical;
      line-height: 1.35;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: .88rem;
    }

    .sync-status {
      min-height: 22px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 700;
    }

    .secondary {
      background: #eef1f0;
    }

    .danger {
      color: white;
      background: var(--danger);
    }

    .good {
      color: white;
      background: var(--good);
    }

    .empty {
      grid-column: 1 / -1;
      display: grid;
      place-items: center;
      min-height: 180px;
      padding: 20px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, .62);
    }

    @media (max-width: 820px) {
      .app {
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .speak-button {
        min-height: 54px;
        width: 100%;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-template-rows: auto auto;
      }

      .categories {
        grid-auto-flow: column;
        grid-auto-columns: minmax(140px, 1fr);
        overflow-x: auto;
      }

      .sidebar-tools {
        grid-template-columns: 1fr 1fr;
      }

      .board {
        grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
        gap: 10px;
      }

      .tile {
        min-height: 122px;
      }
    }

    body.phone-mode .app {
      width: min(430px, 100%);
      padding: 10px;
    }

    body.phone-mode .topbar {
      align-items: flex-start;
      flex-direction: column;
    }

    body.phone-mode .controls {
      width: 100%;
      justify-content: flex-start;
    }

    body.phone-mode .composer,
    body.phone-mode .main {
      grid-template-columns: 1fr;
    }

    body.phone-mode .speak-button {
      min-height: 56px;
      width: 100%;
    }

    body.phone-mode .sidebar {
      grid-template-rows: auto auto;
    }

    body.phone-mode .categories {
      grid-auto-flow: column;
      grid-auto-columns: minmax(132px, 1fr);
      overflow-x: auto;
    }

    body.phone-mode .sidebar-tools {
      grid-template-columns: 1fr 1fr;
    }

    body.phone-mode .board {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    body.phone-mode .tile {
      min-height: 126px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg width="27" height="27" viewBox="0 0 24 24" fill="none">
            <path d="M4 5.8C4 4.8 4.8 4 5.8 4h12.4c1 0 1.8.8 1.8 1.8v8.4c0 1-.8 1.8-1.8 1.8H10l-4.2 3.4c-.7.5-1.8 0-1.8-.9V5.8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M8 9h8M8 12h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>Komunikator AAC</h1>
          <p>Plansze, zdania i głos w jednym prostym widoku</p>
        </div>
      </div>
      <div class="controls">
        <button class="pill-button" id="voiceTest" type="button" title="Sprawdź głos">
          <span aria-hidden="true">▶</span>
          <span>Test</span>
        </button>
        <button class="pill-button" id="phoneMode" type="button" title="Układ pionowy na telefon">
          <span aria-hidden="true">📱</span>
          <span>Telefon</span>
        </button>
        <button class="pill-button" id="syncOpen" type="button" title="Synchronizacja z telefonem">
          <span aria-hidden="true">⇄</span>
          <span>Sync</span>
        </button>
        <select class="pill-button" id="voiceSelect" title="Wybierz głos" aria-label="Wybierz głos"></select>
      </div>
    </section>

    <section class="composer" aria-label="Budowane zdanie">
      <div class="sentence" id="sentence">
        <span class="placeholder">Dotknij kafelków, aby ułożyć wypowiedź</span>
      </div>
      <button class="speak-button" id="speak" type="button">
        <span aria-hidden="true">🔊</span>
        <span>Powiedz</span>
      </button>
    </section>

    <section class="main">
      <aside class="sidebar" aria-label="Kategorie">
        <input class="search" id="search" type="search" placeholder="Szukaj słowa..." aria-label="Szukaj słowa">
        <nav class="categories" id="categories"></nav>
        <div class="sidebar-tools">
          <button class="pill-button secondary" id="undo" type="button" title="Cofnij ostatnie słowo">
            <span aria-hidden="true">↶</span>
            <span>Cofnij</span>
          </button>
          <button class="pill-button secondary" id="clear" type="button" title="Wyczyść zdanie">
            <span aria-hidden="true">⌫</span>
            <span>Wyczyść</span>
          </button>
        </div>
      </aside>

      <section class="board-wrap">
        <header class="board-head">
          <div class="board-title">
            <h2 id="boardTitle">Podstawowe</h2>
            <p id="boardSubtitle">Najczęściej używane komunikaty</p>
          </div>
          <div class="board-actions">
            <button class="pill-button secondary" id="quickSpeak" type="button" title="Odczytaj kafelek po dotknięciu">
              <span aria-hidden="true">⚡</span>
              <span>Tryb szybki</span>
            </button>
            <button class="pill-button good" id="addTile" type="button" title="Dodaj własny kafelek">
              <span aria-hidden="true">＋</span>
              <span>Dodaj</span>
            </button>
          </div>
        </header>
        <div class="board" id="board"></div>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <header>
        <h3 id="modalTitle">Nowy kafelek</h3>
        <button class="icon-button" id="closeModal" type="button" title="Zamknij" aria-label="Zamknij">×</button>
      </header>
      <form class="form" id="tileForm">
        <label>
          Tekst
          <input id="tileText" required maxlength="36" placeholder="np. Chcę przerwę">
        </label>
        <label>
          Ikona
          <input id="tileIcon" maxlength="4" placeholder="np. ✋">
        </label>
        <label>
          Kategoria
          <select id="tileCategory"></select>
        </label>
      </form>
      <footer>
        <button class="pill-button danger" id="deleteCustom" type="button">Usuń własne</button>
        <button class="pill-button secondary" id="cancelModal" type="button">Anuluj</button>
        <button class="pill-button good" id="saveTile" type="submit" form="tileForm">Zapisz</button>
      </footer>
    </div>
  </div>

  <div class="modal-backdrop" id="syncBackdrop" role="dialog" aria-modal="true" aria-labelledby="syncTitle">
    <div class="modal">
      <header>
        <h3 id="syncTitle">Synchronizacja z telefonem</h3>
        <button class="icon-button" id="closeSync" type="button" title="Zamknij" aria-label="Zamknij">×</button>
      </header>
      <div class="sync-box">
        <label>
          Kod ustawień i własnych kafelków
          <textarea id="syncCode" spellcheck="false"></textarea>
        </label>
        <div class="sync-status" id="syncStatus"></div>
      </div>
      <footer>
        <button class="pill-button secondary" id="copySync" type="button">Kopiuj</button>
        <button class="pill-button secondary" id="importSync" type="button">Wczytaj</button>
        <button class="pill-button good" id="closeSyncFooter" type="button">Gotowe</button>
      </footer>
    </div>
  </div>

      {
        id: "actions",
        name: "Czynności",

        subtitle: "Co chcę zrobić",
        tiles: [
          ["iść", "🚶"], ["zobaczyć", "👀"], ["słuchać", "👂"], ["bawić się", "🧩"],
          ["czytać", "📖"], ["pisać", "✏️"], ["rysować", "🎨"], ["otworzyć", "🔓"],
          ["zamknąć", "🔒"], ["włączyć", "🔛"], ["wyłączyć", "⏻"], ["wybrać", "☝️"],
          ["dać", "🤲"], ["wziąć", "✋"], ["pokazać", "🖼️"], ["pomóc", "🤝"],
          ["czekać", "⏳"], ["usiąść", "🪑"], ["wstać", "🧍"], ["położyć się", "🛌"],
          ["umyć", "🧽"], ["ubrać się", "👕"], ["zdjąć", "🧥"], ["spróbować", "🧪"]
        ]
      },
      {
        id: "places",
        name: "Miejsca",
        icon: "📍",
        subtitle: "Dokąd lub gdzie",
        tiles: [
          ["dom", "🏠"], ["szkoła", "🏫"], ["pokój", "🛏️"], ["kuchnia", "🍳"],
          ["łazienka", "🛁"], ["sklep", "🛒"], ["park", "🌳"], ["samochód", "🚗"],
          ["gabinet", "🚪"], ["plac zabaw", "🛝"], ["stół", "🪑"], ["łóżko", "🛌"],
          ["ogród", "🌷"], ["przystanek", "🚏"], ["autobus", "🚌"], ["pociąg", "🚆"],
          ["szpital", "🏥"], ["apteka", "⚕️"], ["biblioteka", "📚"], ["sala", "🚪"],
          ["korytarz", "↔️"], ["boisko", "🥅"], ["basen", "🏊"], ["kino", "🎬"]
        ]
      },
      {
        id: "food",
        name: "Jedzenie",
        icon: "🍎",
        subtitle: "Jedzenie i picie",
        tiles: [
          ["woda", "💧"], ["herbata", "☕"], ["sok", "🧃"], ["kanapka", "🥪"],
          ["zupa", "🍲"], ["jabłko", "🍎"], ["banan", "🍌"], ["jogurt", "🥣"],
          ["obiad", "🍛"], ["deser", "🍰"], ["słone", "🥨"], ["słodkie", "🍬"],
          ["śniadanie", "🍳"], ["kolacja", "🌙"], ["mleko", "🥛"], ["kakao", "☕"],
          ["chleb", "🍞"], ["ser", "🧀"], ["jajko", "🥚"], ["makaron", "🍝"],
          ["ryż", "🍚"], ["kurczak", "🍗"], ["warzywa", "🥦"], ["lody", "🍦"]
        ]
      },
      {
        id: "questions",
        name: "Pytania",
        icon: "❓",
        subtitle: "Szybkie pytania",
        tiles: [
          ["co to jest?", "❓"], ["gdzie?", "📍"], ["kiedy?", "🕒"], ["dlaczego?", "🤔"],
          ["kto?", "👤"], ["ile?", "🔢"], ["czy mogę?", "🙋"], ["co teraz?", "➡️"],
          ["czy pomożesz?", "🤝"], ["czy idziemy?", "🚶"], ["czy skończone?", "🏁"], ["jeszcze raz?", "🔁"],
          ["czy mogę odpocząć?", "🛋️"], ["czy mogę pić?", "🥤"], ["czy mogę jeść?", "🍽️"], ["czy boli?", "🤕"],
          ["czy lubisz?", "👍"], ["czy to moje?", "🎒"], ["czy to twoje?", "👉"], ["czy jest dobrze?", "👌"],
          ["co wybierasz?", "☝️"], ["gdzie idziemy?", "🧭"], ["kiedy wrócimy?", "🏠"], ["co mam zrobić?", "🛠️"]
        ]
      }
    ];

    const state = {
      activeCategory: "basic",
      sentence: [],
      customTiles: JSON.parse(localStorage.getItem("aacCustomTiles") || "[]"),
      quickSpeak: JSON.parse(localStorage.getItem("aacQuickSpeak") || "false"),
      phoneMode: JSON.parse(localStorage.getItem("aacPhoneMode") || "false"),
      tileScale: Number(localStorage.getItem("aacTileScale") || "1"),
      voices: []
    };

    const el = {
      categories: document.getElementById("categories"),
      board: document.getElementById("board"),
      boardTitle: document.getElementById("boardTitle"),
      boardSubtitle: document.getElementById("boardSubtitle"),
      sentence: document.getElementById("sentence"),
      speak: document.getElementById("speak"),
      undo: document.getElementById("undo"),
      clear: document.getElementById("clear"),
      search: document.getElementById("search"),
      quickSpeak: document.getElementById("quickSpeak"),
      addTile: document.getElementById("addTile"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      closeModal: document.getElementById("closeModal"),
      cancelModal: document.getElementById("cancelModal"),
      tileForm: document.getElementById("tileForm"),
      tileText: document.getElementById("tileText"),
      tileIcon: document.getElementById("tileIcon"),
      tileCategory: document.getElementById("tileCategory"),
      deleteCustom: document.getElementById("deleteCustom"),
      saveTile: document.getElementById("saveTile"),
      voiceSelect: document.getElementById("voiceSelect"),
      voiceTest: document.getElementById("voiceTest"),
      phoneMode: document.getElementById("phoneMode"),
      syncOpen: document.getElementById("syncOpen"),
      syncBackdrop: document.getElementById("syncBackdrop"),
      closeSync: document.getElementById("closeSync"),
      closeSyncFooter: document.getElementById("closeSyncFooter"),
      syncCode: document.getElementById("syncCode"),
      syncStatus: document.getElementById("syncStatus"),
      copySync: document.getElementById("copySync"),
      importSync: document.getElementById("importSync")
    };

    function allCategories() {
      return baseCategories.map(category => ({
        ...category,
        tiles: [
          ...category.tiles.map(([text, icon]) => ({ text, icon, categoryId: category.id, custom: false })),
          ...state.customTiles.filter(tile => tile.categoryId === category.id)
        ]
      }));
    }

    function currentCategory() {
      return allCategories().find(category => category.id === state.activeCategory) || allCategories()[0];
    }

    function saveCustomTiles() {
      localStorage.setItem("aacCustomTiles", JSON.stringify(state.customTiles));
    }

    function buildSyncPayload() {
      return {
        type: "aac-sync",
        version: 1,
        customTiles: state.customTiles,
        quickSpeak: state.quickSpeak,
        phoneMode: state.phoneMode
      };
    }

    function encodeSyncPayload() {
      return btoa(unescape(encodeURIComponent(JSON.stringify(buildSyncPayload()))));
    }

    function decodeSyncPayload(code) {
      return JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    }

    function speakText(text) {
      if (!text.trim()) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "pl-PL";
      const selectedVoice = state.voices.find(voice => voice.name === el.voiceSelect.value);
      if (selectedVoice) utterance.voice = selectedVoice;
      utterance.rate = 0.92;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function renderCategories() {
      const categories = allCategories();
      el.categories.innerHTML = "";
      el.tileCategory.innerHTML = "";

      categories.forEach(category => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `category-tab${category.id === state.activeCategory ? " active" : ""}`;
        button.innerHTML = `<span class="category-icon">${category.icon}</span><span>${category.name}</span>`;
        button.addEventListener("click", () => {
          state.activeCategory = category.id;
          el.search.value = "";
          render();
        });
        el.categories.appendChild(button);

        const option = document.createElement("option");
        option.value = category.id;
        option.textContent = category.name;
        el.tileCategory.appendChild(option);
      });
    }

    function renderSentence() {
      el.sentence.innerHTML = "";
      if (!state.sentence.length) {
        const placeholder = document.createElement("span");
        placeholder.className = "placeholder";
        placeholder.textContent = "Dotknij kafelków, aby ułożyć wypowiedź";
        el.sentence.appendChild(placeholder);
        return;
      }

      state.sentence.forEach((tile, index) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "word-chip";
        chip.title = "Usuń słowo";
        chip.innerHTML = `<span>${tile.icon || "💬"}</span><span>${tile.text}</span>`;
        chip.addEventListener("click", () => {
          state.sentence.splice(index, 1);
          renderSentence();
        });
        el.sentence.appendChild(chip);
      });
      el.sentence.scrollLeft = el.sentence.scrollWidth;
    }

    function renderBoard() {
      const category = currentCategory();
      const query = el.search.value.trim().toLocaleLowerCase("pl");
      const tiles = query
        ? allCategories().flatMap(group => group.tiles).filter(tile => tile.text.toLocaleLowerCase("pl").includes(query))
        : category.tiles;

      el.boardTitle.textContent = query ? "Wyniki wyszukiwania" : category.name;
      el.boardSubtitle.textContent = query ? `Znaleziono: ${tiles.length}` : category.subtitle;
      el.board.innerHTML = "";
      el.board.style.fontSize = `${state.tileScale}rem`;

      if (!tiles.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Brak pasujących kafelków. Możesz dodać własny komunikat.";
        el.board.appendChild(empty);
        return;
      }

      tiles.forEach(tile => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tile${state.tileScale < .95 ? " small" : ""}`;
        button.innerHTML = `<span class="tile-icon">${tile.icon || "💬"}</span><span class="tile-label">${tile.text}</span>`;
        button.addEventListener("click", () => {
          state.sentence.push(tile);
          renderSentence();
          if (state.quickSpeak) speakText(tile.text);
        });
        button.addEventListener("contextmenu", event => {
          event.preventDefault();
          if (tile.custom) removeCustomTile(tile);
        });
        el.board.appendChild(button);
      });
    }

    function renderControls() {
      document.body.classList.toggle("phone-mode", state.phoneMode);
      el.phoneMode.style.background = state.phoneMode ? "#e6f3ed" : "#eef1f0";
      el.phoneMode.style.borderColor = state.phoneMode ? "rgba(36, 116, 79, .45)" : "var(--line)";
      el.quickSpeak.style.background = state.quickSpeak ? "#e6f3ed" : "#eef1f0";
      el.quickSpeak.style.borderColor = state.quickSpeak ? "rgba(36, 116, 79, .45)" : "var(--line)";
    }

    function render() {
      renderCategories();
      renderSentence();
      renderBoard();
      renderControls();
    }

    function openModal() {
      el.tileForm.reset();
      el.tileCategory.value = state.activeCategory;
      el.modalBackdrop.classList.add("open");
      window.setTimeout(() => el.tileText.focus(), 30);
    }

    function closeModal() {
      el.modalBackdrop.classList.remove("open");
    }

    function openSyncModal() {
      el.syncCode.value = encodeSyncPayload();
      el.syncStatus.textContent = "Skopiuj kod na telefon albo wklej tutaj kod z telefonu i wybierz Wczytaj.";
      el.syncBackdrop.classList.add("open");
      window.setTimeout(() => el.syncCode.select(), 30);
    }

    function closeSyncModal() {
      el.syncBackdrop.classList.remove("open");
    }

    function removeCustomTile(tile) {
      state.customTiles = state.customTiles.filter(item => !(item.text === tile.text && item.categoryId === tile.categoryId));
      saveCustomTiles();
      render();
    }

    function loadVoices() {
      state.voices = window.speechSynthesis.getVoices();
      const polish = state.voices.filter(voice => voice.lang.toLowerCase().startsWith("pl"));
      const fallback = state.voices.filter(voice => !voice.lang.toLowerCase().startsWith("pl"));
      el.voiceSelect.innerHTML = "";
      [...polish, ...fallback].forEach(voice => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        el.voiceSelect.appendChild(option);
      });
      const saved = localStorage.getItem("aacVoice");
      if (saved && state.voices.some(voice => voice.name === saved)) el.voiceSelect.value = saved;
    }

    el.speak.addEventListener("click", () => speakText(state.sentence.map(tile => tile.text).join(" ")));
    el.voiceTest.addEventListener("click", () => speakText("To jest test głosu komunikatora."));
    el.undo.addEventListener("click", () => {
      state.sentence.pop();
      renderSentence();
    });
    el.clear.addEventListener("click", () => {
      state.sentence = [];
      renderSentence();
      window.speechSynthesis.cancel();
    });
    el.search.addEventListener("input", renderBoard);
    el.quickSpeak.addEventListener("click", () => {
      state.quickSpeak = !state.quickSpeak;
      localStorage.setItem("aacQuickSpeak", JSON.stringify(state.quickSpeak));
      renderControls();
    });
    el.phoneMode.addEventListener("click", () => {
      state.phoneMode = !state.phoneMode;
      localStorage.setItem("aacPhoneMode", JSON.stringify(state.phoneMode));
      renderControls();
    });
    el.addTile.addEventListener("click", openModal);
    el.closeModal.addEventListener("click", closeModal);
    el.cancelModal.addEventListener("click", closeModal);
    el.modalBackdrop.addEventListener("click", event => {
      if (event.target === el.modalBackdrop) closeModal();
    });
    el.syncOpen.addEventListener("click", openSyncModal);
    el.closeSync.addEventListener("click", closeSyncModal);
    el.closeSyncFooter.addEventListener("click", closeSyncModal);
    el.syncBackdrop.addEventListener("click", event => {
      if (event.target === el.syncBackdrop) closeSyncModal();
    });
    el.copySync.addEventListener("click", async () => {
      el.syncCode.value = encodeSyncPayload();
      el.syncCode.select();
      try {
        await navigator.clipboard.writeText(el.syncCode.value);
        el.syncStatus.textContent = "Kod skopiowany. Wklej go w aplikacji na telefonie.";
      } catch (error) {
        el.syncStatus.textContent = "Zaznaczyłem kod. Skopiuj go ręcznie.";
      }
    });
    el.importSync.addEventListener("click", () => {
      try {
        const payload = decodeSyncPayload(el.syncCode.value);
        if (payload.type !== "aac-sync" || !Array.isArray(payload.customTiles)) {
          throw new Error("Nieprawidłowy kod");
        }
        state.customTiles = payload.customTiles;
        state.quickSpeak = Boolean(payload.quickSpeak);
        state.phoneMode = Boolean(payload.phoneMode);
        saveCustomTiles();
        localStorage.setItem("aacQuickSpeak", JSON.stringify(state.quickSpeak));
        localStorage.setItem("aacPhoneMode", JSON.stringify(state.phoneMode));
        render();
        el.syncStatus.textContent = "Wczytano ustawienia i własne kafelki.";
      } catch (error) {
        el.syncStatus.textContent = "Nie udało się wczytać kodu. Sprawdź, czy został skopiowany w całości.";
      }
    });
    el.tileForm.addEventListener("submit", event => {
      event.preventDefault();
      const text = el.tileText.value.trim();
      if (!text) return;
      state.customTiles.push({
        text,
        icon: el.tileIcon.value.trim() || "💬",
        categoryId: el.tileCategory.value,
        custom: true
      });
      saveCustomTiles();
      closeModal();
      render();
    });
    el.deleteCustom.addEventListener("click", () => {
      state.customTiles = state.customTiles.filter(tile => tile.categoryId !== state.activeCategory);
      saveCustomTiles();
      render();
      closeModal();
    });
    el.voiceSelect.addEventListener("change", () => localStorage.setItem("aacVoice", el.voiceSelect.value));

    window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    loadVoices();
    render();
  </script>
</body>
</html>
